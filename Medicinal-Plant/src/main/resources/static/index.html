<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>药用植物知识库 · 智能问答助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f6fbf7;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-app {
            width: 100%;
            max-width: 1000px;
            height: 95vh;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 28px;
            border-bottom: 1px solid #e9edf2;
            background: white;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #2f855a, #38a169);
            width: 40px;
            height: 40px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: 600;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #22543d, #2f855a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .badge {
            background: #e9f7ef;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #276749;
            font-weight: 500;
        }

        .user-id-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 5px 12px;
            border-radius: 40px;
        }

        .user-id-area label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #2d3e50;
        }

        .user-id-input {
            border: 1px solid #dce3ec;
            background: white;
            padding: 6px 12px;
            border-radius: 28px;
            font-size: 0.85rem;
            width: 90px;
            text-align: center;
            font-weight: 500;
            outline: none;
        }

        .user-id-input:focus {
            border-color: #38a169;
            box-shadow: 0 0 0 2px rgba(56,161,105,0.18);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            scroll-behavior: smooth;
            background: #ffffff;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 8px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        .message {
            display: flex;
            margin-bottom: 24px;
            animation: fadeInUp 0.25s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 26px;
            line-height: 1.55;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .message-content {
            background: #e8f7ef;
            color: #0b2b26;
            border-radius: 22px 22px 4px 22px;
        }

        .assistant .message-content {
            background: #f1f5f9;
            color: #1e2a3e;
            border-radius: 22px 22px 22px 4px;
            border: 1px solid #eef2f8;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 12px;
            flex-shrink: 0;
            background: #eef3fc;
        }

        .user .avatar {
            order: 2;
            margin-left: 12px;
            margin-right: 0;
            background: #d9e8f5;
        }

        .assistant .avatar {
            background: #dff3ea;
        }

        .thinking {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #6c86a3;
            font-size: 0.85rem;
        }

        .dot-floating {
            display: inline-flex;
            gap: 4px;
        }

        .dot-floating span {
            width: 6px;
            height: 6px;
            background: #86a7c1;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.4s infinite both;
        }

        .dot-floating span:nth-child(2) { animation-delay: 0.2s; }
        .dot-floating span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8);}
            40% { opacity: 1; transform: scale(1);}
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .input-area {
            padding: 18px 24px 24px;
            border-top: 1px solid #edf2f7;
            background: white;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 48px;
            padding: 8px 8px 8px 20px;
            transition: 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #38a169;
            box-shadow: 0 0 0 2px rgba(56,161,105,0.18);
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 12px 0;
            max-height: 140px;
            background: transparent;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #9aaebf;
        }

        button {
            background: #38a169;
            border: none;
            border-radius: 40px;
            padding: 8px 22px;
            font-weight: 500;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: #2f855a;
            transform: scale(0.97);
        }

        button:disabled {
            background: #b7d7c6;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: #eef2f6;
            color: #4b5e77;
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        .clear-btn:hover {
            background: #e2e8f0;
            color: #1f3b4c;
            transform: none;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .info-footer {
            font-size: 0.7rem;
            color: #8ca0b3;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="chat-app">
    <div class="chat-header">
        <div class="title-section">
            <div class="logo-icon">🌿</div>
            <h1>药用植物知识库</h1>
            <div class="badge">AI 智能助手 · 流式对话</div>
        </div>
        <div class="user-id-area">
            <label>🧠 记忆ID</label>
            <input type="number" id="userIdInput" class="user-id-input" value="1001" step="1" min="1">
            <button id="clearChatBtn" class="clear-btn">清空对话</button>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="message assistant">
            <div class="avatar">🌱</div>
            <div class="message-content">
                嗨！我是药用植物知识库助手 🌿<br>
                你可以问我关于药用植物的功效、性味归经、用法用量、禁忌等问题。<br>
                <strong>例如：</strong>"人参有什么功效？"、"黄芪怎么搭配？"、"当归的禁忌有哪些？"～<br>
                试试开启一次深度对话吧！
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="action-row">
            <div style="font-size: 12px; color:#4f7a6b;">✨ 支持上下文记忆 · 流式响应</div>
        </div>
        <div class="input-wrapper">
            <textarea id="messageInput" rows="1" placeholder="向药用植物助手提问..."></textarea>
            <button id="sendBtn">
                <span>✨</span> 发送
            </button>
        </div>
        <div class="info-footer">
            💡 助手基于药用植物知识库，会调用工具查询详细信息
        </div>
    </div>
</div>

<script>
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const userIdInput = document.getElementById('userIdInput');
    const clearChatBtn = document.getElementById('clearChatBtn');

    let isWaitingResponse = false;
    let currentStreamController = null;

    function getUserId() {
        let val = parseInt(userIdInput.value, 10);
        return isNaN(val) ? 1001 : Math.max(1, val);
    }

    function addMessage(role, content, isStreaming = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? '🧑‍💻' : '🤖';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = content.replace(/\n/g, '<br>');

        if (role === 'user') {
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
        } else {
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
        }

        if (isStreaming) {
            messageDiv.setAttribute('data-streaming', 'true');
        }

        messagesContainer.appendChild(messageDiv);
        scrollToBottom();
        return messageDiv;
    }

    function updateStreamingMessage(messageDiv, text) {
        const contentDiv = messageDiv.querySelector('.message-content');
        if (contentDiv) {
            const displayText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
            contentDiv.innerHTML = displayText;
            scrollToBottom();
        }
    }

    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function clearChatUI() {
        while (messagesContainer.firstChild) {
            messagesContainer.removeChild(messagesContainer.firstChild);
        }

        const welcomeDiv = document.createElement('div');
        welcomeDiv.className = 'message assistant';
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = '🌱';
        const content = document.createElement('div');
        content.className = 'message-content';
        content.innerHTML = '嗨！我是药用植物知识库助手。<br>你可以问我关于药用植物的功效、性味归经、用法用量、禁忌等问题。<br><strong>例如：</strong>“人参有什么功效？”、“黄芪怎么搭配？”、“当归的禁忌有哪些？”<br>试试开启一次深度对话吧！';
        welcomeDiv.appendChild(avatar);
        welcomeDiv.appendChild(content);
        messagesContainer.appendChild(welcomeDiv);
        scrollToBottom();
    }

    function autoResizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 140) + 'px';
    }

    async function sendMessage(userMessage) {
        if (!userMessage.trim() || isWaitingResponse) return;

        const userId = getUserId();

        // 添加用户消息
        addMessage('user', userMessage);
        messageInput.value = '';
        autoResizeTextarea();

        // 创建助手消息占位
        const assistantMessageDiv = document.createElement('div');
        assistantMessageDiv.className = 'message assistant';
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = '🌿';
        const contentPlaceholder = document.createElement('div');
        contentPlaceholder.className = 'message-content';
        contentPlaceholder.innerHTML = '<div class="thinking"><span>🌿 正在思考</span><div class="dot-floating"><span></span><span></span><span></span></div></div>';
        assistantMessageDiv.appendChild(avatar);
        assistantMessageDiv.appendChild(contentPlaceholder);
        messagesContainer.appendChild(assistantMessageDiv);
        scrollToBottom();

        isWaitingResponse = true;
        sendBtn.disabled = true;

        let accumulatedText = '';
        const abortController = new AbortController();
        currentStreamController = abortController;

        try {
            const encodedMessage = encodeURIComponent(userMessage);
            const streamUrl = `/ai/memory_stream_chat?message=${encodedMessage}&userId=${userId}`;

            const response = await fetch(streamUrl, {
                method: 'GET',
                signal: abortController.signal,
                headers: {
                    'Accept': 'text/stream, application/json'
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            // 清空占位内容
            const placeholderDiv = assistantMessageDiv.querySelector('.message-content');
            if (placeholderDiv) {
                placeholderDiv.innerHTML = '';
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                accumulatedText += chunk;
                updateStreamingMessage(assistantMessageDiv, accumulatedText);
            }

            if (!accumulatedText.trim()) {
                updateStreamingMessage(assistantMessageDiv, '抱歉，我暂时没有获取到回答，请稍后再试。🌿');
            }

        } catch (error) {
            console.error('流式请求错误:', error);
            let errorMsg = '网络或服务异常，请检查后端服务是否启动。';
            if (error.name === 'AbortError') {
                errorMsg = '请求已取消。';
            }
            updateStreamingMessage(assistantMessageDiv, `❌ ${errorMsg}`);
        } finally {
            isWaitingResponse = false;
            sendBtn.disabled = false;
            currentStreamController = null;
            messageInput.focus();
        }
    }

    function handleSend() {
        const text = messageInput.value.trim();
        if (!text) return;

        if (isWaitingResponse) {
            const tip = document.createElement('div');
            tip.className = 'message assistant';
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '⚠️';
            const content = document.createElement('div');
            content.className = 'message-content';
            content.style.background = '#fff3e0';
            content.textContent = '请等待上一条回复完成后再提问。';
            tip.appendChild(avatar);
            tip.appendChild(content);
            messagesContainer.appendChild(tip);
            scrollToBottom();
            setTimeout(() => tip.remove(), 2000);
            return;
        }

        sendMessage(text);
    }

    messageInput.addEventListener('input', autoResizeTextarea);
    sendBtn.addEventListener('click', handleSend);

    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });

    clearChatBtn.addEventListener('click', () => {
        clearChatUI();
    });

    userIdInput.addEventListener('change', () => {
        const newId = getUserId();
        const tip = document.createElement('div');
        tip.className = 'message assistant';
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = '🔄';
        const content = document.createElement('div');
        content.className = 'message-content';
        content.style.background = '#eef2fa';
        content.textContent = `已切换至记忆ID: ${newId}，后续对话将基于新的聊天上下文`;
        tip.appendChild(avatar);
        tip.appendChild(content);
        messagesContainer.appendChild(tip);
        scrollToBottom();
        setTimeout(() => tip.remove(), 3000);
    });

    window.addEventListener('load', () => {
        autoResizeTextarea();
        messageInput.focus();
    });

    window.addEventListener('beforeunload', () => {
        if (currentStreamController) {
            currentStreamController.abort();
        }
    });
</script>
</body>
</html>
